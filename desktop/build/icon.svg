<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- near-black backdrop with a faint cool glow, like the album's void -->
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.78">
      <stop offset="0" stop-color="#0b1122"/>
      <stop offset="0.6" stop-color="#070a13"/>
      <stop offset="1" stop-color="#04060b"/>
    </radialGradient>
    <radialGradient id="baseGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2b6cff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#2b6cff" stop-opacity="0"/>
    </radialGradient>

    <!-- dark glass, split into two faces for depth -->
    <linearGradient id="glassL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2437"/>
      <stop offset="1" stop-color="#090d16"/>
    </linearGradient>
    <linearGradient id="glassR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1420"/>
      <stop offset="1" stop-color="#05080e"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#7ea6ff"/>
    </linearGradient>

    <!-- incoming beam fades in from the left edge -->
    <linearGradient id="beam" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="193" y2="0">
      <stop offset="0" stop-color="#dce9ff" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#eef4ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="flare" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="softBig" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <!-- refracted spectrum, red (top) → violet (bottom), fanning off the right face -->
    <g id="spectrum">
      <polygon points="329.2,290.0 330.8,293.9 512,262.3 512,244.0" fill="#ff3b30"/>
      <polygon points="330.8,293.9 332.4,297.7 512,280.6 512,262.3" fill="#ff9500"/>
      <polygon points="332.4,297.7 334.0,301.6 512,298.9 512,280.6" fill="#ffd60a"/>
      <polygon points="334.0,301.6 335.6,305.4 512,317.1 512,298.9" fill="#34c759"/>
      <polygon points="335.6,305.4 337.2,309.3 512,335.4 512,317.1" fill="#32ade6"/>
      <polygon points="337.2,309.3 338.8,313.1 512,353.7 512,335.4" fill="#3a5bff"/>
      <polygon points="338.8,313.1 340.4,317.0 512,372.0 512,353.7" fill="#af52de"/>
    </g>
    <g id="inbeam">
      <line x1="0" y1="270" x2="193" y2="295" stroke="url(#beam)" stroke-width="7" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- backdrop -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="262" cy="406" rx="158" ry="42" fill="url(#baseGlow)"/>

  <!-- diffuse halos behind the glass -->
  <use href="#spectrum" filter="url(#softBig)" opacity="0.55"/>
  <use href="#inbeam" filter="url(#softBig)" opacity="0.6"/>

  <!-- prism glass: two faces meeting on the apex→base axis -->
  <polygon points="262,128 150,398 262,398" fill="url(#glassL)"/>
  <polygon points="262,128 262,398 374,398" fill="url(#glassR)"/>

  <!-- faint internal light travelling to the right face -->
  <line x1="193" y1="295" x2="334" y2="302" stroke="#ffffff" stroke-opacity="0.22" stroke-width="5" stroke-linecap="round"/>
  <!-- soft sheen on the lit left face -->
  <polygon points="262,128 150,398 214,398" fill="#ffffff" opacity="0.05"/>

  <!-- crisp bright edges -->
  <polygon points="262,128 150,398 374,398" fill="none"
           stroke="url(#edge)" stroke-opacity="0.85" stroke-width="3.2" stroke-linejoin="round"/>
  <line x1="262" y1="128" x2="150" y2="398" stroke="#f2f6ff" stroke-opacity="0.7" stroke-width="2.4"/>

  <!-- refracted spectrum + incoming beam on top -->
  <use href="#spectrum"/>
  <use href="#inbeam"/>

  <!-- starburst where the beam meets the glass -->
  <circle cx="193" cy="295" r="30" fill="url(#flare)"/>
  <line x1="151" y1="295" x2="235" y2="295" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.6"/>
  <line x1="193" y1="266" x2="193" y2="324" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.4"/>
  <circle cx="193" cy="295" r="4.5" fill="#ffffff"/>
</svg>
